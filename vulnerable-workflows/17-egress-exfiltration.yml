# ============================================================================
# SCENARIO 17: Egress Exfiltration vs Smart Allowlisting
# ============================================================================
# This workflow mixes legitimate network calls (npm, PyPI, GitHub API)
# with actual exfiltration attempts. SCG's smart egress allowlisting
# should PASS the legitimate calls and ALERT only on the malicious ones.
#
# SCG Detection: Network Scanner + Egress Allowlisting Engine
