name: AI Model Training Pipeline
on: [push]

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SCA-060: OpenAI API key pattern (deliberately mangled to avoid push protection)
      - name: Run inference
        run: |
          # WARNING: hardcoded credential - SCG should detect sk-proj prefix
          export OPENAI_API_KEY="sk-proj-FAKE_KEY_PLACEHOLDER_FOR_DEMO_ONLY_0000000000"
          python3 train.py --model gpt-4

      # SCA-060: Anthropic API key pattern
      - name: Run Claude analysis
        run: |
          # WARNING: hardcoded credential - SCG should detect sk-ant prefix
          export ANTHROPIC_API_KEY="sk-ant-FAKE_KEY_PLACEHOLDER_FOR_DEMO_ONLY_00000000000000000000000000000000"
          python3 analyze.py

      # SCA-060: Google AI key pattern
      - name: Vertex AI integration
        run: |
          # WARNING: hardcoded credential - SCG should detect AIzaSy prefix
          export GOOGLE_API_KEY="AIzaSy-FAKE_KEY_PLACEHOLDER_FOR_DEMO_ONLY_000"
          curl -H "Authorization: Bearer $GOOGLE_API_KEY" https://generativelanguage.googleapis.com/v1/models

      # SCA-044: AWS access key pattern
      - name: Upload results to S3
        run: |
          # WARNING: hardcoded credential - SCG should detect AKIA prefix
          export AWS_ACCESS_KEY_ID="AKIA-FAKE-KEY-PLACEHOLDER"
          export AWS_SECRET_ACCESS_KEY="FAKE/SECRET/KEY/PLACEHOLDER/FOR/DEMO/ONLY"
          aws s3 cp results.json s3://training-results/

      # SCA-044: GitHub PAT token pattern
      - name: Update model registry
        run: |
          # WARNING: hardcoded credential - SCG should detect ghp_ and npm_ prefixes
          export GH_TOKEN="ghp_FAKE_PAT_PLACEHOLDER_FOR_DEMO_ONLY_00000"
          export NPM_AUTH="npm_FAKE_AUTH_PLACEHOLDER_FOR_DEMO_ONLY_0000"
          curl -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/org/model-registry
