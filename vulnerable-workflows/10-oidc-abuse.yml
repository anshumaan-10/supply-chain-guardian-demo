# ============================================================================
# SCENARIO 10: OIDC Token Abuse & Identity Confusion
# ============================================================================
# This workflow requests OIDC tokens with overly broad audiences and
# exposes them in ways that enable identity confusion attacks.
#
# SCG Detection: OIDC Token Audit Scanner
# Expected Severity: HIGH
# ============================================================================

name: "Cloud Deploy with OIDC (VULNERABLE)"
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ⚠️ WILDCARD AUDIENCE: Token accepted by any audience
      - name: Get OIDC token
        run: |
          TOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=*" -s | jq -r '.value')
          echo "OIDC_TOKEN=$TOKEN" >> $GITHUB_ENV

      # ⚠️ TOKEN LOGGED: OIDC token printed to workflow logs
      - name: Debug token
        run: |
          echo "Token: $OIDC_TOKEN"
          echo "$OIDC_TOKEN" | base64 -d | jq .

      # ⚠️ SCOPE ESCALATION: Using token for unrelated service
      - name: Deploy to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::*:role/*
          aws-region: us-east-1
