        run: |
          curl -sL https://github.com/jpillora/chisel/releases/latest/download/chisel_linux_amd64.gz -o /tmp/chisel.gz
          gunzip /tmp/chisel.gz
          chmod +x /tmp/chisel

      # ⚠️ BINARY IN SUSPICIOUS LOCATION: Executable in .github directory
      - name: Setup hooks
        run: |
          cp /tmp/chisel .github/hooks/pre-commit
          chmod +x .github/hooks/pre-commit
