# ============================================================================
# SCENARIO 03: Secret Exposure & Credential Leakage
# ============================================================================
# This workflow contains hardcoded secrets, exposed API keys, and patterns
# that match known credential formats for AWS, GitHub, and AI services.
#
# SCG Detection: Secret Exposure Scanner (SCA-030 to SCA-065)
# Expected Severity: CRITICAL
# ============================================================================

name: "Deploy to Production (VULNERABLE)"
on:
  push:
    branches: [main]

env:
  # HARDCODED AWS CREDENTIALS - SCG should detect AKIA prefix and secret key pattern
  AWS_ACCESS_KEY_ID: AKIA_EXAMPLE_NOT_REAL_KEY
  AWS_SECRET_ACCESS_KEY: EXAMPLE/SECRET/KEY/NOT/REAL/PLACEHOLDER/VALUE

  # HARDCODED GITHUB PAT - SCG should detect ghp_ prefix
  DEPLOY_TOKEN: ghp_EXAMPLE_NOT_A_REAL_TOKEN_PLACEHOLDER

  # HARDCODED OPENAI API KEY - SCG should detect sk-proj prefix
  OPENAI_API_KEY: sk-proj-EXAMPLE_NOT_A_REAL_KEY_PLACEHOLDER

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SECRET LOGGED TO STDOUT
      - name: Debug credentials
        run: |
          echo "Using key: $AWS_ACCESS_KEY_ID"
          echo "Token: $DEPLOY_TOKEN"
          curl -H "Authorization: Bearer $OPENAI_API_KEY" https://api.openai.com/v1/models

      # SLACK WEBHOOK EXPOSED
      - name: Notify Slack
        run: |
          # SCG detects webhook URLs hardcoded in workflows
          SLACK_HOOK="https://hooks.example.com/services/TXXXXXX/BXXXXXX/XXXXXXXXXXXX"
          curl -X POST "$SLACK_HOOK" -d '{"text": "Deployed to production"}'

      # PRIVATE KEY IN ENVIRONMENT
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: |
            -----BEGIN RSA PRIVATE KEY-----
            MIIEowIBAAKCAQEA0Z3VS5JJcds3xfn/ygWyF2PbnGMi
            EXAMPLE_KEY_CONTENT_DO_NOT_USE
            -----END RSA PRIVATE KEY-----
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key deploy@prod.example.com
