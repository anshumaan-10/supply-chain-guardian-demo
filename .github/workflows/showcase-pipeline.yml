# =============================================================================
# Supply Chain Guardian - Threat Detection Showcase Pipeline
# Copyright (c) 2025-2026 Anshumaan Singh. All rights reserved.
#
# This pipeline demonstrates how Supply Chain Guardian detects 20 real-world
# supply chain attack vectors across workflow files, package manifests,
# container configs, and CI/CD pipelines.
#
# Repository: https://github.com/anshumaan-10/supply-chain-guardian
# Marketplace: https://github.com/marketplace/actions/supply-chain-guardian
# =============================================================================

name: Supply Chain Guardian - Threat Detection Showcase

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      scan-mode:
        description: Scan depth for manual runs
        required: false
        default: deep
        type: choice
        options:
          - quick
          - standard
          - deep
          - paranoid

permissions:
  contents: read
  security-events: write
  actions: read

# =============================================================================
# JOB 1: Signature-Based Detection (fast feedback gate)
# =============================================================================
jobs:
  signature-scan:
    name: "Step 1 - Signature Detection"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      status: ${{ steps.scan.outputs.scan-status }}
      total: ${{ steps.scan.outputs.total-findings }}
      critical: ${{ steps.scan.outputs.critical-findings }}
      high: ${{ steps.scan.outputs.high-findings }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Display scan configuration
        run: |
          echo "================================================================"
          echo "  Supply Chain Guardian - Signature Scan"
          echo "  Mode:       quick (signatures only)"
          echo "  Repository: ${{ github.repository }}"
          echo "  Commit:     ${{ github.sha }}"
          echo "  Trigger:    ${{ github.event_name }}"
          echo "================================================================"

      - name: Run signature-based detection
        id: scan
        uses: anshumaan-10/supply-chain-guardian@v4
        with:
          scan-mode: quick
          fail-on-severity: none
          sarif-output: 'false'
          json-output: quick-scan-report.json
          table-output: 'true'
          verbose: 'true'
          artifact-name: scg-quick-scan
        continue-on-error: true

      - name: Print results summary
        if: always()
        run: |
          echo "================================================================"
          echo "  Signature Scan Results"
          echo "----------------------------------------------------------------"
          echo "  Status:   ${{ steps.scan.outputs.scan-status }}"
          echo "  Total:    ${{ steps.scan.outputs.total-findings }}"
          echo "  Critical: ${{ steps.scan.outputs.critical-findings }}"
          echo "  High:     ${{ steps.scan.outputs.high-findings }}"
          echo "  Medium:   ${{ steps.scan.outputs.medium-findings }}"
          echo "  Low:      ${{ steps.scan.outputs.low-findings }}"
          echo "================================================================"

  # ===========================================================================
  # JOB 2: Deep Multi-Scanner Analysis (all 17 scanners + binary analysis)
  # ===========================================================================
  deep-analysis:
    name: "Step 2 - Deep Multi-Scanner Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: signature-scan
    outputs:
      status: ${{ steps.scan.outputs.scan-status }}
      total: ${{ steps.scan.outputs.total-findings }}
      critical: ${{ steps.scan.outputs.critical-findings }}
      high: ${{ steps.scan.outputs.high-findings }}
      exempted: ${{ steps.scan.outputs.exempted-findings }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Display deep scan configuration
        run: |
          echo "================================================================"
          echo "  Supply Chain Guardian - Deep Analysis"
          echo "  Scanners:  17 modules active"
          echo "  Patterns:  110+ attack signatures"
          echo "  Binary:    ELF/PE/Mach-O detection enabled"
          echo "================================================================"

      - name: Run deep multi-scanner analysis
        id: scan
        uses: anshumaan-10/supply-chain-guardian@v4
        with:
          scan-mode: deep
          fail-on-severity: none
          scan-binaries: 'true'
          html-output: 'true'
          html-output-path: deep-scan-report.html
          sarif-output: 'true'
          json-output: deep-scan-report.json
          table-output: 'true'
          verbose: 'true'
          artifact-name: scg-deep-scan
        continue-on-error: true

      - name: Print deep scan results
        if: always()
        run: |
          echo "================================================================"
          echo "  Deep Analysis Results"
          echo "----------------------------------------------------------------"
          echo "  Status:   ${{ steps.scan.outputs.scan-status }}"
          echo "  Total:    ${{ steps.scan.outputs.total-findings }}"
          echo "  Critical: ${{ steps.scan.outputs.critical-findings }}"
          echo "  High:     ${{ steps.scan.outputs.high-findings }}"
          echo "  Medium:   ${{ steps.scan.outputs.medium-findings }}"
          echo "  Low:      ${{ steps.scan.outputs.low-findings }}"
          echo "  Exempted: ${{ steps.scan.outputs.exempted-findings }}"
          echo "================================================================"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: html-report-deep
          path: deep-scan-report.html
          retention-days: 90

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: json-report-deep
          path: deep-scan-report.json
          retention-days: 90

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sarif-report-deep
          path: supply-chain-guardian.sarif
          retention-days: 90

  # ===========================================================================
  # JOB 3: Runtime Behavioral Monitoring (split-mode demonstration)
  # ===========================================================================
  runtime-monitoring:
    name: "Step 3 - Runtime Behavioral Monitoring"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: signature-scan
    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Explain runtime monitoring
        run: |
          echo "================================================================"
          echo "  Runtime Behavioral Monitoring - Split Mode"
          echo "----------------------------------------------------------------"
          echo "  Phase 1: Start background monitor daemon"
          echo "  Phase 2: Execute build steps (monitored in real-time)"
          echo "  Phase 3: Collect runtime findings alongside static scan"
          echo ""
          echo "  The daemon watches for:"
          echo "    - Cryptominer processes"
          echo "    - Reverse shell connections"
          echo "    - Credential file access (/proc/mem, /etc/shadow)"
          echo "    - Suspicious executables in /tmp"
          echo "    - Persistence mechanisms (systemd, cron)"
          echo "================================================================"

      - name: Start runtime monitor daemon
        uses: anshumaan-10/supply-chain-guardian@v4
        with:
          mode: monitor-start
          runtime-monitor-interval: '5'
          skip-artifact-upload: 'true'

      - name: Simulate package installation
        run: |
          echo '{"name":"demo-app","version":"1.0.0","scripts":{"test":"echo ok"}}' > package.json
          echo "Installing dependencies..."
          sleep 3

      - name: Simulate build compilation
        run: |
          mkdir -p dist
          echo "console.log('application started');" > dist/index.js
          echo "Build completed successfully."
          sleep 2

      - name: Simulate test execution
        run: |
          echo "Running test suite..."
          echo "All 42 tests passed."
          sleep 2

      - name: Collect runtime findings with static scan
        id: scan
        uses: anshumaan-10/supply-chain-guardian@v4
        with:
          scan-mode: standard
          fail-on-severity: none
          scan-runtime: 'true'
          table-output: 'true'
          verbose: 'true'
          sarif-output: 'false'
          artifact-name: scg-runtime-scan
        continue-on-error: true

      - name: Print runtime monitoring results
        if: always()
        run: |
          echo "================================================================"
          echo "  Runtime Monitoring Results"
          echo "----------------------------------------------------------------"
          echo "  Status:   ${{ steps.scan.outputs.scan-status }}"
          echo "  Total:    ${{ steps.scan.outputs.total-findings }}"
          echo "  Critical: ${{ steps.scan.outputs.critical-findings }}"
          echo "  High:     ${{ steps.scan.outputs.high-findings }}"
          echo "================================================================"

  # ===========================================================================
  # JOB 4: Exception Engine and Allowlisting
  # ===========================================================================
  exception-management:
    name: "Step 4 - Exception Engine and Allowlisting"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: signature-scan
    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Explain exception engine
        run: |
          echo "================================================================"
          echo "  Exception Engine - False Positive Management"
          echo "----------------------------------------------------------------"
          echo "  Layer 1: Inline suppression (# scg-ignore:RULE-ID)"
          echo "  Layer 2: Repository-level .scg-config.yml"
          echo "  Layer 3: Organization-wide central policy"
          echo ""
          echo "  Exempted findings remain in reports for audit trail."
          echo "  Each exemption requires: reason, approver, expiry date."
          echo "================================================================"

      - name: Load exception configuration
        run: |
          cp vulnerable-workflows/18-scg-config.yml .scg-config.yml
          echo "Exception config loaded:"
          echo "----------------------------------------------------------------"
          cat .scg-config.yml

      - name: Run scan with exception engine
        id: scan
        uses: anshumaan-10/supply-chain-guardian@v4
        with:
          scan-mode: standard
          fail-on-severity: none
          table-output: 'true'
          json-output: exception-scan-report.json
          verbose: 'true'
          sarif-output: 'false'
          artifact-name: scg-exception-scan
        continue-on-error: true

      - name: Print exception engine results
        if: always()
        run: |
          echo "================================================================"
          echo "  Exception Engine Results"
          echo "----------------------------------------------------------------"
          echo "  Active findings:  ${{ steps.scan.outputs.total-findings }}"
          echo "  Exempted:         ${{ steps.scan.outputs.exempted-findings }}"
          echo "  (Exempted findings remain in reports for compliance)"
          echo "================================================================"

  # ===========================================================================
  # JOB 5: Paranoid Zero-Trust Audit (maximum detection, lowest threshold)
  # ===========================================================================
  paranoid-audit:
    name: "Step 5 - Paranoid Zero-Trust Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deep-analysis, runtime-monitoring, exception-management]
    outputs:
      status: ${{ steps.scan.outputs.scan-status }}
      total: ${{ steps.scan.outputs.total-findings }}
      critical: ${{ steps.scan.outputs.critical-findings }}
      high: ${{ steps.scan.outputs.high-findings }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Explain paranoid audit mode
        run: |
          echo "================================================================"
          echo "  Paranoid Mode - Zero Trust Audit"
          echo "----------------------------------------------------------------"
          echo "  All 17 scanners at maximum sensitivity"
          echo "  110+ signature patterns"
          echo "  Binary analysis with /tmp and /dev/shm sweep"
          echo "  Egress allowlisting enforcement"
          echo "  Cross-platform CI/CD configuration audit"
          echo "  Fail threshold: none (for demonstration)"
          echo "================================================================"

      - name: Run paranoid zero-trust audit
        id: scan
        uses: anshumaan-10/supply-chain-guardian@v4
        with:
          scan-mode: paranoid
          fail-on-severity: none
          scan-binaries: 'true'
          html-output: 'true'
          html-output-path: paranoid-audit-report.html
          sarif-output: 'true'
          json-output: paranoid-audit-report.json
          table-output: 'true'
          verbose: 'true'
          artifact-name: scg-paranoid-audit
        continue-on-error: true

      - name: Print paranoid audit results
        if: always()
        run: |
          echo "================================================================"
          echo "  Paranoid Audit Results"
          echo "----------------------------------------------------------------"
          echo "  Status:   ${{ steps.scan.outputs.scan-status }}"
          echo "  Total:    ${{ steps.scan.outputs.total-findings }}"
          echo "  Critical: ${{ steps.scan.outputs.critical-findings }}"
          echo "  High:     ${{ steps.scan.outputs.high-findings }}"
          echo "  Medium:   ${{ steps.scan.outputs.medium-findings }}"
          echo "  Low:      ${{ steps.scan.outputs.low-findings }}"
          echo "  Exempted: ${{ steps.scan.outputs.exempted-findings }}"
          echo "================================================================"

      - name: Upload paranoid HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: html-report-paranoid
          path: paranoid-audit-report.html
          retention-days: 90

      - name: Upload paranoid JSON report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: json-report-paranoid
          path: paranoid-audit-report.json
          retention-days: 90

  # ===========================================================================
  # JOB 6: SARIF Integration with GitHub Security Tab
  # ===========================================================================
  security-integration:
    name: "Step 6 - Security Tab Integration"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deep-analysis
    if: always()
    permissions:
      security-events: write
    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: sarif-report-deep

      - name: Upload findings to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8ff85221d12737ec1137e6a892722e5130f32d05 # v3.28.8
        with:
          sarif_file: supply-chain-guardian.sarif
          category: supply-chain-guardian
        continue-on-error: true

      - name: Confirm SARIF upload
        run: |
          echo "================================================================"
          echo "  SARIF uploaded to GitHub Advanced Security"
          echo "  View at: Repository > Security > Code Scanning Alerts"
          echo "  Findings appear as inline annotations on exact lines."
          echo "================================================================"

  # ===========================================================================
  # JOB 7: Deploy HTML Reports to GitHub Pages
  # ===========================================================================
  report-deployment:
    name: "Step 7 - Deploy Reports to GitHub Pages"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deep-analysis, paranoid-audit]
    if: github.ref == 'refs/heads/main' && always()
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download deep scan HTML report
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: html-report-deep
          path: public/reports/

      - name: Download paranoid audit HTML report
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: html-report-paranoid
          path: public/reports/
        continue-on-error: true

      - name: Generate site pages
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: '3.12'

      - name: Build site content
        run: |
          python3 scripts/generate-site.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
          commit_message: "deploy: threat detection reports"

  # ===========================================================================
  # JOB 8: Pipeline Summary
  # ===========================================================================
  pipeline-summary:
    name: "Step 8 - Pipeline Summary"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [signature-scan, deep-analysis, runtime-monitoring, exception-management, paranoid-audit, security-integration, report-deployment]
    if: always()
    steps:
      - name: Aggregate and display pipeline results
        run: |
          echo ""
          echo "================================================================"
          echo "  SUPPLY CHAIN GUARDIAN - PIPELINE COMPLETE"
          echo "================================================================"
          echo ""
          echo "  Step 1 - Signature Detection:        ${{ needs.signature-scan.outputs.status }}"
          echo "  Step 2 - Deep Multi-Scanner Analysis: ${{ needs.deep-analysis.outputs.status }}"
          echo "  Step 3 - Runtime Behavioral Monitor:  Complete"
          echo "  Step 4 - Exception Engine:            Complete"
          echo "  Step 5 - Paranoid Zero-Trust Audit:   ${{ needs.paranoid-audit.outputs.status }}"
          echo "  Step 6 - Security Tab Integration:    Complete"
          echo "  Step 7 - Report Deployment:           Complete"
          echo "  Step 8 - Pipeline Summary:            Running"
          echo ""
          echo "  FINDINGS SUMMARY"
          echo "  ----------------------------------------------------------------"
          echo "  Deep Scan Total:    ${{ needs.deep-analysis.outputs.total }}"
          echo "  Deep Scan Critical: ${{ needs.deep-analysis.outputs.critical }}"
          echo "  Deep Scan High:     ${{ needs.deep-analysis.outputs.high }}"
          echo "  Paranoid Total:     ${{ needs.paranoid-audit.outputs.total }}"
          echo "  Paranoid Critical:  ${{ needs.paranoid-audit.outputs.critical }}"
          echo "  Paranoid High:      ${{ needs.paranoid-audit.outputs.high }}"
          echo ""
          echo "  ARTIFACTS"
          echo "  ----------------------------------------------------------------"
          echo "  html-report-deep         HTML report (deep scan)"
          echo "  html-report-paranoid     HTML report (paranoid audit)"
          echo "  json-report-deep         JSON data (deep scan)"
          echo "  json-report-paranoid     JSON data (paranoid audit)"
          echo "  sarif-report-deep        SARIF (GitHub Security tab)"
          echo ""
          echo "  DEPLOYED REPORTS"
          echo "  ----------------------------------------------------------------"
          echo "  https://www.devsecopswithanshu.com/supply-chain-guardian-demo/tools/supply-chain-guardian/"
          echo ""
          echo "================================================================"
          echo "  Supply Chain Guardian v4"
          echo "  Built by Anshumaan Singh"
          echo "  https://github.com/anshumaan-10/supply-chain-guardian"
          echo "  https://github.com/marketplace/actions/supply-chain-guardian"
          echo "  Copyright (c) 2025-2026 Anshumaan Singh. All rights reserved."
          echo "================================================================"
